# Merge with the vendored Supabase stack (run from repo root with SIS27_ROOT set):
#   export SIS27_ROOT="$(pwd)"
#   docker compose --env-file infra/supabase/docker/.env \
#     -f infra/supabase/docker/docker-compose.yml \
#     -f infra/deploy/docker-compose.sis27.yml \
#     -p sis27 up -d
#
# Compose resolves relative paths from the *first* compose file’s directory, so this overlay
# uses SIS27_ROOT for the web build and Caddy bind mount. Scripts in infra/deploy/scripts set it.
#
# Required in infra/supabase/docker/.env (see infra/deploy/env.supabase.sis27.example):
#   SIS27_PUBLIC_URL — browser-facing origin (same host users type in the address bar)

services:
  # Publish Kong on the host so Studio/API are reachable at http://<vm-ip>:8000/ when the
  # VPC firewall allows tcp:8000 (see rule sis27-allow-supabase-kong-8000). Caddy still proxies
  # the same stack on :80/:443 via SIS27_PUBLIC_URL.
  kong:
    ports:
      - "8000:8000/tcp"

  # First boot runs many DB migrations; default health window is too short and breaks `studio → kong` startup.
  analytics:
    healthcheck:
      start_period: 120s
      interval: 5s
      timeout: 10s
      retries: 30

  web:
    build:
      context: ${SIS27_ROOT:?Set SIS27_ROOT to the repository root (see infra/deploy/scripts/compose.sh)}
      dockerfile: apps/web/Dockerfile
      cache_from:
        - type=local,src=${SIS27_DOCKER_BUILD_CACHE_DIR:-.docker-build-cache}/web
      cache_to:
        - type=local,dest=${SIS27_DOCKER_BUILD_CACHE_DIR:-.docker-build-cache}/web,mode=max
      args:
        NUXT_PUBLIC_SUPABASE_URL: ${SIS27_PUBLIC_URL}
        NUXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
    container_name: sis27-web
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      NUXT_PUBLIC_SUPABASE_URL: ${SIS27_PUBLIC_URL}
      NUXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
    depends_on:
      kong:
        condition: service_healthy

  contact:
    build:
      context: ${SIS27_ROOT:?Set SIS27_ROOT to the repository root (see infra/deploy/scripts/compose.sh)}
      dockerfile: apps/contact/Dockerfile
      cache_from:
        - type=local,src=${SIS27_DOCKER_BUILD_CACHE_DIR:-.docker-build-cache}/contact
      cache_to:
        - type=local,dest=${SIS27_DOCKER_BUILD_CACHE_DIR:-.docker-build-cache}/contact,mode=max
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${SIS27_PUBLIC_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
        NEXT_PUBLIC_BASE_PATH: /contact
    container_name: sis27-contact
    restart: unless-stopped
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${SIS27_PUBLIC_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      NEXT_PUBLIC_BASE_PATH: /contact
    depends_on:
      kong:
        condition: service_healthy

  goals:
    build:
      context: ${SIS27_ROOT:?Set SIS27_ROOT to the repository root (see infra/deploy/scripts/compose.sh)}
      dockerfile: apps/goals/Dockerfile
      cache_from:
        - type=local,src=${SIS27_DOCKER_BUILD_CACHE_DIR:-.docker-build-cache}/goals
      cache_to:
        - type=local,dest=${SIS27_DOCKER_BUILD_CACHE_DIR:-.docker-build-cache}/goals,mode=max
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${SIS27_PUBLIC_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
        NEXT_PUBLIC_BASE_PATH: /goals
    container_name: sis27-goals
    restart: unless-stopped
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${SIS27_PUBLIC_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      NEXT_PUBLIC_BASE_PATH: /goals
    depends_on:
      kong:
        condition: service_healthy

  sis27-caddy:
    image: caddy:2-alpine
    container_name: sis27-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${SIS27_ROOT}/infra/deploy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      web:
        condition: service_started
      contact:
        condition: service_started
      goals:
        condition: service_started
      kong:
        condition: service_healthy
