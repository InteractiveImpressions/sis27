name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Omit 'environment' until you create it in GitHub; add for approval gates later.
    steps:
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: |
            ${{ secrets.SIS27_CONTACT_DEPLOY_KEY }}
            ${{ secrets.SIS27_GOALS_DEPLOY_KEY }}

      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Init git submodules (Contact, Goals)
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git submodule update --init --force --recursive

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync repository and deploy on VM
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          GCP_ZONE: ${{ secrets.GCP_ZONE }}
          GCP_INSTANCE: ${{ secrets.GCP_INSTANCE }}
          SIS27_DEPLOY_PATH: ${{ secrets.SIS27_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "${GCP_PROJECT:-}" && test -n "${GCP_ZONE:-}" && test -n "${GCP_INSTANCE:-}" && test -n "${SIS27_DEPLOY_PATH:-}"
          tar -C "${GITHUB_WORKSPACE}" -czf /tmp/sis27-sync.tgz \
            --exclude=node_modules \
            --exclude=apps/web/node_modules \
            --exclude=apps/contact/node_modules \
            --exclude=apps/goals/node_modules \
            --exclude=packages/platform/node_modules \
            --exclude=apps/web/.nuxt \
            --exclude=apps/web/.output \
            --exclude=apps/contact/.next \
            --exclude=apps/goals/.next \
            --exclude=packages/platform/dist \
            --exclude=.docker-build-cache \
            --exclude=infra/supabase/docker/volumes/db/data \
            .
          gcloud compute scp /tmp/sis27-sync.tgz "${GCP_INSTANCE}:~/sis27-sync.tgz" \
            --project="${GCP_PROJECT}" \
            --zone="${GCP_ZONE}" \
            --quiet
          gcloud compute scp "${GITHUB_WORKSPACE}/infra/deploy/scripts/apply-ci-sync.sh" "${GCP_INSTANCE}:~/apply-ci-sync.sh" \
            --project="${GCP_PROJECT}" \
            --zone="${GCP_ZONE}" \
            --quiet
          gcloud compute ssh "${GCP_INSTANCE}" \
            --project="${GCP_PROJECT}" \
            --zone="${GCP_ZONE}" \
            --quiet \
            --command="chmod +x ~/apply-ci-sync.sh && bash ~/apply-ci-sync.sh '${SIS27_DEPLOY_PATH}'"
