name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Private submodule: `actions/checkout` with submodules rewrites git@ → HTTPS and
      # cannot use a deploy key. Load the key first, then init submodules over SSH.
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SIS27_CONTACT_DEPLOY_KEY }}

      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init git submodules (Contact)
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git submodule update --init --force --recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
